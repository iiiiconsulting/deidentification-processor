# ProductSalesReport schema
# Source columns: productname, variantName, customerName, count, amount, profit, dateCreated, Username

# Name column(s) that get hashed into patientId
identity:
  source: customerName

columns:
  customerName: hash
  Username: strip
  productname: pass
  variantName: pass
  count: pass
  amount: pass
  profit: pass
  dateCreated: pass
